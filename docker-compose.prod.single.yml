services:
  # One-off migration runner against Managed Postgres
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: sorcery-migrate
    restart: "no"
    env_file:
      - .env.production
    command: ["npx", "prisma", "migrate", "deploy"]

  # Self-hosted Redis for Socket.IO adapter and shared state
  redis:
    image: redis:7-alpine
    container_name: sorcery-redis
    restart: unless-stopped
    env_file:
      - .env.production
    command: >
      sh -c "redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""
    ports:
      - "6380:6379" # Expose Redis on port 6380 for Vercel Next.js access
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a \"$$REDIS_PASSWORD\" ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redisdata:/data

  # Single Socket.IO server instance
  server1:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: sorcery-server-1
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      INSTANCE_ID: server1
      PORT: 3010
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    expose:
      - "3010"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e ''http=require("http");http.get("http://127.0.0.1:3010/healthz",res=>{process.exit(res.statusCode===200?0:1)}).on("error",()=>process.exit(1))''',
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  # Public entrypoint: TLS + reverse-proxy to single server
  caddy:
    image: caddy:2-alpine
    container_name: sorcery-caddy
    user: root
    restart: unless-stopped
    environment:
      # Space-separated CIDRs or IPs allowed to access /metrics and /metrics.json
      # Example: "203.0.113.10/32 198.51.100.0/24"
      METRICS_IP_ALLOWLIST: ${METRICS_IP_ALLOWLIST:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.prod.single:/etc/caddy/Caddyfile:ro
      - /var/log/caddy:/var/log/caddy
      # Persist Caddy certificates and account data
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server1

volumes:
  redisdata:
  caddy_data:
  caddy_config:
