openapi: 3.0.3
info:
  title: All Players MVP
  version: 0.1.0
paths:
  /players/available:
    get:
      summary: List currently available players
      description: Returns players who are online, not in a match, and have presence visible. Hidden users are excluded.
      parameters:
        - in: query
          name: sort
          schema: { type: string, enum: [recent, alphabetical] }
          description: recent = prioritize last 10 opponents (frequency desc, then most recent); alphabetical = by displayName
        - in: query
          name: q
          schema: { type: string }
          description: Case‑insensitive search by displayName
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 100 }
          description: Max results per page (MVP default 100)
        - in: query
          name: cursor
          schema: { type: string }
          description: Pagination cursor for progressive loading
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/PlayerListItem'
                  nextCursor:
                    type: string
                    nullable: true
        '401': { description: Unauthorized }
  /api/friends:
    post:
      summary: Add a player as a friend
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetUserId]
              properties:
                targetUserId: { type: string }
      responses:
        '201': { description: Created }
        '200': { description: Already a friend }
        '401': { description: Unauthorized }
        '409': { description: Conflict (duplicate) }
  /api/invites:
    post:
      summary: Invite a player to play
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetUserId]
              properties:
                targetUserId: { type: string }
      responses:
        '202': { description: Accepted for processing }
        '401': { description: Unauthorized }
        '409': { description: Target unavailable }
components:
  schemas:
    PlayerListItem:
      type: object
      required: [userId, shortUserId, displayName, presence]
      properties:
        userId: { type: string }
        shortUserId: { type: string, description: 'Human‑friendly short ID' }
        displayName: { type: string }
        avatarUrl: { type: string, nullable: true }
        presence:
          type: object
          required: [online, inMatch]
          properties:
            online: { type: boolean }
            inMatch: { type: boolean }
        isFriend: { type: boolean }
        lastPlayedAt: { type: string, format: date-time, nullable: true }
        matchCountInLast10: { type: integer, minimum: 0, maximum: 10, nullable: true }
