services:
  # One-off migration runner against Managed Postgres
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: sorcery-migrate
    restart: "no"
    env_file:
      - .env.production
    command: ["npx", "prisma", "migrate", "deploy"]

  # Self-hosted Redis for Socket.IO adapter and shared state
  redis:
    image: redis:7-alpine
    container_name: sorcery-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redisdata:/data

  # Socket.IO server instances (horizontal scaling via Redis adapter)
  server1:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: sorcery-server-1
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      INSTANCE_ID: server1
      PORT: 3010
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    expose:
      - "3010"

  server2:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: sorcery-server-2
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      INSTANCE_ID: server2
      PORT: 3010
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    expose:
      - "3010"

  # Public entrypoint: TLS + reverse-proxy/load-balancer
  caddy:
    image: caddy:2-alpine
    container_name: sorcery-caddy
    user: root
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - /var/log/caddy:/var/log/caddy
    depends_on:
      - server1
      - server2

volumes:
  redisdata:
