#cloud-config
package_update: true
package_upgrade: true
packages:
  - docker.io
  - docker-compose-plugin
  - git
  - ca-certificates
  - curl
  - jq
  - fail2ban
  - logrotate

write_files:
  - path: /etc/docker/daemon.json
    owner: root:root
    permissions: '0644'
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {"max-size": "50m", "max-file": "3"}
      }
  - path: /root/DEPLOY_README.txt
    owner: root:root
    permissions: '0644'
    content: |
      Contested Realms WS Server
      ======================================
      Repo: /opt/sorcery-client
      Config: /opt/sorcery-client/.env.production

      1) Edit .env.production and set:
         - NEXTAUTH_SECRET=...
         - DATABASE_URL=... (pooled)
         - DIRECT_URL=... (primary)
         - REDIS_URL=...
         - SOCKET_REQUIRE_JWT=true
         - SOCKET_CORS_ORIGIN=https://realms.cards,https://*.vercel.app

      2) Start stack:
         cd /opt/sorcery-client && docker compose -f docker-compose.prod.yml up -d --build

      3) Check health:
         curl -fsS https://ws.realms.cards/healthz | jq .

      Logs:
         docker compose -f docker-compose.prod.yml logs -f caddy server1 server2

  - path: /etc/fail2ban/filter.d/caddy-json.conf
    owner: root:root
    permissions: '0644'
    content: |
      [Definition]
      # Match Caddy JSON access logs for undesirable statuses
      failregex = ^.*"request":\{"remote_addr":"<HOST>:[0-9]+".*"status":\s?(?:400|401|403|404|429).*$
      ignoreregex =

  - path: /etc/fail2ban/jail.d/caddy.conf
    owner: root:root
    permissions: '0644'
    content: |
      [caddy]
      enabled = true
      port = http,https
      filter = caddy-json
      logpath = /var/log/caddy/access.log
      maxretry = 15
      findtime = 10m
      bantime = 1h
      backend = auto
      action = iptables-multiport[name=caddy, port="http,https"]

  - path: /etc/logrotate.d/caddy
    owner: root:root
    permissions: '0644'
    content: |
      /var/log/caddy/*.log {
        daily
        rotate 7
        missingok
        notifempty
        compress
        delaycompress
        copytruncate
      }

runcmd:
  - |
    set -euxo pipefail
    # Enable and start Docker
    systemctl enable --now docker
    # Enable fail2ban and prepare log dir for Caddy (for Fail2ban)
    mkdir -p /var/log/caddy
    chmod 755 /var/log/caddy
    systemctl enable --now fail2ban
    # Create app dir
    mkdir -p /opt/sorcery-client
    cd /opt/sorcery-client
    # Clone repo if missing (replace https://github.com/geleeroyale/contested-realms.git before use)
    if [ ! -d .git ]; then
      git clone https://github.com/geleeroyale/contested-realms.git .
    else
      git pull --ff-only || true
    fi
    # Prepare env
    if [ ! -f .env.production ]; then
      if [ -f env.production.example ]; then
        cp env.production.example .env.production
      else
        touch .env.production
      fi
    fi
    # Start stack only if essential secrets are filled (non-empty)
    if grep -qE '^NEXTAUTH_SECRET=.+$' .env.production \
       && grep -qE '^DATABASE_URL=.+$' .env.production \
       && grep -qE '^DIRECT_URL=.+$' .env.production \
       && grep -qE '^REDIS_URL=.+$' .env.production; then
      docker compose -f docker-compose.prod.yml up -d --build
    else
      echo "[cloud-init] .env.production not fully configured; stack not started. Edit /opt/sorcery-client/.env.production and run: docker compose -f docker-compose.prod.yml up -d --build" | tee /root/DEPLOYMENT_INSTRUCTIONS.txt
    fi
