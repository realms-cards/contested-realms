services:
  postgres:
    image: postgres:16-alpine
    container_name: sorcery-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sorcery
      POSTGRES_USER: sorcery
      POSTGRES_PASSWORD: sorcery
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sorcery"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sorcery-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redisdata:/data

  # One-off migration runner (applies Prisma migrations)
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: sorcery-migrate
    environment:
      DATABASE_URL: postgresql://sorcery:sorcery@postgres:5432/sorcery?schema=public
      DIRECT_URL: postgresql://sorcery:sorcery@postgres:5432/sorcery?schema=public
    depends_on:
      - postgres
    command: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"

  # Single Socket.IO server instance
  server1:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: sorcery-server-1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://sorcery:sorcery@postgres:5432/sorcery?schema=public
      DIRECT_URL: postgresql://sorcery:sorcery@postgres:5432/sorcery?schema=public
      REDIS_URL: redis://redis:6379
      INSTANCE_ID: server1
      PORT: 3010
    depends_on:
      - postgres
      - redis
      - migrate
    expose:
      - "3010"

  turn:
    image: instrumentisto/coturn:latest
    container_name: sorcery-turn
    restart: unless-stopped
    environment:
      - TURN_USERNAME=${TURN_USERNAME:-devuser}
      - TURN_PASSWORD=${TURN_PASSWORD:-devpass}
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49160-49200:49160-49200/udp"
    command: >
      turnserver
        --listening-port=3478
        --fingerprint
        --lt-cred-mech
        --user=${TURN_USERNAME:-devuser}:${TURN_PASSWORD:-devpass}
        --realm=localhost
        --min-port=49160 --max-port=49200
        --no-tls --no-dtls --no-cli

  # Caddy reverse proxy to single server
  caddy:
    image: caddy:2-alpine
    container_name: sorcery-caddy
    restart: unless-stopped
    ports:
      - "3010:3010"
    volumes:
      - ./Caddyfile.dev.single:/etc/caddy/Caddyfile:ro
    depends_on:
      - server1

volumes:
  pgdata:
  redisdata:
