name: Build Check

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: npm run build
    runs-on: ubuntu-latest
    container:
      image: node:20-bookworm
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
